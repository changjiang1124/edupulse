{% extends 'base.html' %}

{% block title %}Delete Course Group - EduPulse{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Delete Course Group</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
                <p class="text-muted">This action is only available when the group has no child courses.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'academics:course_group_detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Delete Group</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
