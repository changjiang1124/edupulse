{% load static %}
<script src="{% static 'js/tinymce/js/tinymce/tinymce.min.js' %}"></script>
<script>
tinymce.init({
    selector: '#id_description',
    height: 360,
    menubar: false,
    branding: false,
    promotion: false,
    license_key: 'gpl',
    plugins: 'lists link code help wordcount image',
    toolbar: 'undo redo | bold italic underline | bullist numlist | link uploadimage | code | help',
    content_style: 'body { font-family:Helvetica,Arial,sans-serif; font-size:14px } img { max-width: 100%; height: auto; }',
    images_upload_url: '{% url "core:tinymce_upload" %}',
    images_upload_handler: function (blobInfo, progress) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.withCredentials = false;
            xhr.open('POST', '{% url "core:tinymce_upload" %}');

            const formData = new FormData();
            formData.append('file', blobInfo.blob(), blobInfo.filename());
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            xhr.upload.onprogress = function (e) {
                progress(e.loaded / e.total * 100);
            };

            xhr.onload = function() {
                if (xhr.status === 403) {
                    reject({ message: 'HTTP Error: ' + xhr.status, remove: true });
                    return;
                }

                if (xhr.status < 200 || xhr.status >= 300) {
                    reject('HTTP Error: ' + xhr.status);
                    return;
                }

                let json;
                try {
                    json = JSON.parse(xhr.responseText);
                } catch (error) {
                    reject('Invalid JSON: ' + xhr.responseText);
                    return;
                }

                if (!json || typeof json.location !== 'string') {
                    reject('Invalid JSON: ' + xhr.responseText);
                    return;
                }

                resolve(json.location);
            };

            xhr.onerror = function () {
                reject('Image upload failed due to a XHR transport error. Code: ' + xhr.status);
            };

            xhr.send(formData);
        });
    },
    image_uploadtab: false,
    image_advtab: false,
    image_caption: false,
    image_description: false,
    image_title: false,
    automatic_uploads: true,
    forced_root_block: 'p',
    force_br_newlines: false,
    force_p_newlines: true,
    setup: function(editor) {
        editor.ui.registry.addButton('uploadimage', {
            text: 'Upload Image',
            icon: 'image',
            tooltip: 'Upload Image',
            onAction: function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.style.display = 'none';

                input.onchange = function() {
                    const file = input.files[0];
                    if (file) {
                        editor.notificationManager.open({
                            text: 'Uploading image...',
                            type: 'info',
                            timeout: 3000
                        });

                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

                        fetch('{% url "core:tinymce_upload" %}', {
                            method: 'POST',
                            body: formData
                        })
                        .then(response => response.json())
                        .then(data => {
                            if (data.location) {
                                const imgHtml = `<img src="${data.location}" alt="${file.name}" style="max-width: 100%; height: auto;" class="img-responsive" />`;
                                editor.insertContent(imgHtml);

                                editor.notificationManager.open({
                                    text: 'Image uploaded successfully!',
                                    type: 'success',
                                    timeout: 2000
                                });
                            } else {
                                throw new Error(data.error || 'Upload failed');
                            }
                        })
                        .catch(error => {
                            editor.notificationManager.open({
                                text: 'Upload failed: ' + error.message,
                                type: 'error',
                                timeout: 5000
                            });
                        });
                    }
                };

                document.body.appendChild(input);
                input.click();
                document.body.removeChild(input);
            }
        });

        editor.on('NodeChange', function(e) {
            if (e.element.tagName === 'IMG') {
                const img = e.element;
                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                if (!img.className.includes('img-responsive')) {
                    img.className = (img.className + ' img-responsive').trim();
                }
            }
        });

        editor.on('drop', function(e) {
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                e.preventDefault();
                const file = files[0];
                editor.notificationManager.open({
                    text: 'Uploading dropped image...',
                    type: 'info',
                    timeout: 3000
                });

                const formData = new FormData();
                formData.append('file', file);
                formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

                fetch('{% url "core:tinymce_upload" %}', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.location) {
                        const imgHtml = `<img src="${data.location}" alt="${file.name}" style="max-width: 100%; height: auto;" class="img-responsive" />`;
                        editor.insertContent(imgHtml);

                        editor.notificationManager.open({
                            text: 'Image uploaded successfully!',
                            type: 'success',
                            timeout: 2000
                        });
                    }
                })
                .catch(error => {
                    editor.notificationManager.open({
                        text: 'Upload failed: ' + error.message,
                        type: 'error',
                        timeout: 5000
                    });
                });
            }
        });
    }
});
</script>
